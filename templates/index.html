<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALIZ Chat Bot - Multilingual AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ecf0f1;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            background: #0f3460;
        }

        .sidebar {
            width: 280px;
            background: #0f3460;
            border-right: 1px solid #1a5276;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1a5276;
        }

        .sidebar-header h1 {
            font-size: 18px;
            color: #3498db;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #95a5a6;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .new-chat-btn:hover {
            background: #2980b9;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #1a5276;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-item:hover {
            background: #2980b9;
        }

        .conversation-item.active {
            background: #3498db;
        }

        .delete-btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .conversation-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f3460;
        }

        .chat-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, #0f3460 0%, #1a5276 100%);
            border-bottom: 1px solid #1a5276;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 16px;
            color: #3498db;
        }

        .language-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #95a5a6;
            background: rgba(52, 152, 219, 0.2);
            padding: 5px 10px;
            border-radius: 3px;
        }

        .language-indicator .flag {
            font-size: 16px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: #3498db;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.assistant .message-bubble {
            background: #34495e;
            color: #ecf0f1;
            border-bottom-left-radius: 2px;
        }

        .message-time {
            font-size: 11px;
            color: #7f8c8d;
            padding: 0 5px;
            display: flex;
            align-items: flex-end;
        }

        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #95a5a6;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #3498db;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-area {
            padding: 15px 20px;
            background: linear-gradient(90deg, #0f3460 0%, #1a5276 100%);
            border-top: 1px solid #1a5276;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 10px 15px;
            background: #34495e;
            border: 1px solid #1a5276;
            border-radius: 5px;
            color: #ecf0f1;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        #message-input:focus {
            outline: none;
            border-color: #3498db;
            background: #3d5a6f;
        }

        #message-input::placeholder {
            color: #7f8c8d;
        }

        .send-btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #2980b9;
        }

        .send-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-in-out;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #7f8c8d;
            text-align: center;
            gap: 15px;
        }

        .empty-state-icon {
            font-size: 48px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #bdc3c7;
        }

        .empty-state p {
            font-size: 13px;
            max-width: 300px;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                position: absolute;
                height: 100%;
                z-index: 100;
                transition: width 0.3s;
            }

            .sidebar.open {
                width: 280px;
            }

            .message-bubble {
                max-width: 85%;
            }

            .delete-btn {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar scrollbar-hide">
            <div class="sidebar-header">
                <h1>🤖 FALIZ Chat</h1>
                <p>Multilingual AI Assistant</p>
            </div>
            <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
            <div class="conversations-list" id="conversations-list"></div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-content">
            <!-- Header -->
            <div class="chat-header">
                <h2>Chat with FALIZ Bot</h2>
                <div class="language-indicator">
                    <span class="flag" id="language-flag">🌍</span>
                    <span id="language-name">Detecting language...</span>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container scrollbar-hide" id="messages-container">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Start a Conversation</h3>
                    <p>Send a message in any language - English, Spanish, French, or Portuguese.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="message-input" 
                        placeholder="Type your message in any language..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LANGUAGE_FLAGS = {
            'en': '🇬🇧',
            'es': '🇪🇸',
            'fr': '🇫🇷',
            'pt': '🇵🇹'
        };

        const LANGUAGE_NAMES = {
            'en': 'English',
            'es': 'Spanish',
            'fr': 'French',
            'pt': 'Portuguese'
        };

        let currentConversationId = null;
        let isLoading = false;
        let currentLanguage = 'en';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            setupEventListeners();
        });

        function initializeApp() {
            startNewChat();
            loadConversations();
        }

        function setupEventListeners() {
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');

            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });

            // Send message on Enter (Shift+Enter for new line)
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Disable send button initially
            updateSendButtonState();
            messageInput.addEventListener('input', updateSendButtonState);
        }

        function updateSendButtonState() {
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = !messageInput.value.trim() || isLoading;
        }

        function startNewChat() {
            fetch('/api/new-conversation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                currentConversationId = data.conversation_id;
                clearMessagesContainer();
                loadConversations();
            })
            .catch(error => {
                console.error('Error creating conversation:', error);
                showError('Failed to create new chat');
            });
        }

        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();

            if (!message || isLoading) {
                return;
            }

            if (!currentConversationId) {
                showError('Please start a new chat first');
                return;
            }

            // Add user message to UI
            addMessage(message, 'user', currentLanguage);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isLoading = true;
            updateSendButtonState();

            // Show loading indicator
            showLoadingIndicator();

            // Send to backend
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message,
                    conversation_id: currentConversationId
                })
            })
            .then(response => {
                removeLoadingIndicator();
                
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.error || 'Failed to send message');
                    });
                }
                return response.json();
            })
            .then(data => {
                // Update language indicator
                updateLanguageIndicator(data.detected_language);
                currentLanguage = data.detected_language;

                // Add assistant response
                addMessage(data.response, 'assistant', data.detected_language);
                
                // Save to localStorage
                saveConversationToLocalStorage();
            })
            .catch(error => {
                console.error('Error:', error);
                showError(error.message || 'Failed to get response from bot');
            })
            .finally(() => {
                isLoading = false;
                updateSendButtonState();
            });
        }

        function addMessage(content, role, language = 'en') {
            const messagesContainer = document.getElementById('messages-container');

            // Remove empty state if exists
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = content;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);

            // Auto-scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 0);
        }

        function showLoadingIndicator() {
            const messagesContainer = document.getElementById('messages-container');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-indicator';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.innerHTML = '<div class="loading-indicator"><span>Bot is thinking</span><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            loadingDiv.appendChild(bubbleDiv);
            messagesContainer.appendChild(loadingDiv);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.remove();
            }
        }

        function updateLanguageIndicator(language) {
            const flagElement = document.getElementById('language-flag');
            const nameElement = document.getElementById('language-name');

            flagElement.textContent = LANGUAGE_FLAGS[language] || '🌍';
            nameElement.textContent = LANGUAGE_NAMES[language] || 'Unknown';
        }

        function showError(message) {
            const messagesContainer = document.getElementById('messages-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '⚠️ ' + message;
            messagesContainer.appendChild(errorDiv);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Remove error after 5 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        function loadConversations() {
            fetch('/api/conversations')
            .then(response => response.json())
            .then(data => {
                const conversationsList = document.getElementById('conversations-list');
                conversationsList.innerHTML = '';

                if (data.conversations && data.conversations.length > 0) {
                    data.conversations.forEach(conv => {
                        const convItem = document.createElement('div');
                        convItem.className = 'conversation-item';
                        if (conv.conversation_id === currentConversationId) {
                            convItem.classList.add('active');
                        }

                        const date = new Date(conv.created_at);
                        const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                        convItem.innerHTML = `
                            <span style="cursor: pointer; flex: 1;" onclick="loadConversation(${conv.conversation_id})">Chat • ${dateStr}</span>
                            <button class="delete-btn" onclick="deleteConversation(${conv.conversation_id}, event)">Delete</button>
                        `;

                        conversationsList.appendChild(convItem);
                    });
                }
            })
            .catch(error => console.error('Error loading conversations:', error));
        }

        function loadConversation(conversationId) {
            currentConversationId = conversationId;
            clearMessagesContainer();
            loadConversations();

            fetch(`/api/conversation/${conversationId}`)
            .then(response => response.json())
            .then(data => {
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role, msg.detected_language);
                    });
                    
                    // Update language from last message
                    const lastMessage = data.messages[data.messages.length - 1];
                    if (lastMessage.detected_language) {
                        updateLanguageIndicator(lastMessage.detected_language);
                        currentLanguage = lastMessage.detected_language;
                    }
                }
            })
            .catch(error => {
                console.error('Error loading conversation:', error);
                showError('Failed to load conversation');
            });
        }

        function deleteConversation(conversationId, event) {
            event.stopPropagation();

            if (!confirm('Delete this conversation?')) {
                return;
            }

            fetch(`/api/delete-conversation/${conversationId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (currentConversationId === conversationId) {
                    startNewChat();
                } else {
                    loadConversations();
                }
            })
            .catch(error => {
                console.error('Error deleting conversation:', error);
                showError('Failed to delete conversation');
            });
        }

        function clearMessagesContainer() {
            const messagesContainer = document.getElementById('messages-container');
            messagesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Start a Conversation</h3>
                    <p>Send a message in any language - English, Spanish, French, or Portuguese.</p>
                </div>
            `;
        }

        function saveConversationToLocalStorage() {
            if (currentConversationId) {
                localStorage.setItem('lastConversationId', currentConversationId);
            }
        }
    </script>
</body>
</html>
